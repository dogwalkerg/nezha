name: Build Dashboard App

on:
  workflow_dispatch:   # 手动触发
  push:
    branches:
      - main           # 推送到 main 分支时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    # 安装 Node.js & pnpm
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install pnpm
      run: npm install -g pnpm

    # 安装 Go
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    # 构建前端
    - name: Build dashboard frontend
      working-directory: dashboard/resource
      run: |
        pnpm install
        pnpm build

    # 编译 Go 主程序
    - name: Build dashboard app
      working-directory: dashboard
      run: |
        go build -o app .

    # 上传构建产物 (Artifacts)
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: dashboard-app
        path: dashboard/app
