name: Build NeZha Dashboard

on:
  push:
    tags:
      - 'v*' # 推送 v 开头的 tag 时触发，例如 v0.1.0
    branches:
      - main # 推送到 main 分支时也触发（可选）
  # 手动触发选项
  workflow_dispatch:

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义需要构建的平台和架构组合
        platform: [linux/amd64, linux/arm64, windows/amd64, darwin/amd64, darwin/arm64]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21' # 指定 Go 版本
          cache: true

      - name: Parse platform matrix
        run: |
          echo "GOOS=${matrix.platform%%/*}" >> $GITHUB_ENV
          echo "GOARCH=${matrix.platform##*/}" >> $GITHUB_ENV

      - name: Build
        run: |
          OUTPUT_NAME="nezha-dashboard"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT_NAME="nezha-dashboard.exe"
          fi
          CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -ldflags="-s -w" -o "$OUTPUT_NAME" ./dashboard
          mkdir -p release
          mv "$OUTPUT_NAME" "release/nezha-dashboard-$GOOS-$GOARCH${OUTPUT_NAME##nezha-dashboard}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nezha-dashboard-${{ env.GOOS }}-${{ env.GOARCH }}
          path: release/nezha-dashboard-${{ env.GOOS }}-${{ env.GOARCH }}*

  # 可选：创建 GitHub Release 并上传所有构建结果
  create-release:
    needs: build-dashboard
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予写入发布的权限

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List files for debugging
        run: find ./artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
