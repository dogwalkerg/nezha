name: Build NeZha Dashboard

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            output: nezha-dashboard-linux-amd64
          - os: linux
            arch: arm64
            output: nezha-dashboard-linux-arm64
          - os: windows
            arch: amd64
            output: nezha-dashboard-windows-amd64.exe
          - os: darwin
            arch: amd64
            output: nezha-dashboard-darwin-amd64
          - os: darwin
            arch: arm64
            output: nezha-dashboard-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Build ${{ matrix.output }}
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build -trimpath -ldflags="-s -w" -o "${{ matrix.output }}" ./cmd/dashboard
          
          # 验证文件确实生成了
          echo "Checking if file was created:"
          ls -la "${{ matrix.output }}" || echo "File not found!"

      - name: Upload ${{ matrix.output }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          # 添加保留时间（可选）
          retention-days: 7

  # 添加一个验证步骤来确认所有文件都已上传
  verify-artifacts:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts
          
      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          find ./downloaded-artifacts -type f -exec ls -la {} \;
          echo "Total files:"
          find ./downloaded-artifacts -type f | wc -l
