name: Build NeZha Dashboard

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
        run: |
          OUTPUT_NAME="nezha-dashboard"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="nezha-dashboard.exe"
          fi
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w -X 'github.com/nezhahq/nezha/pkg/utils.Version=${{ github.ref_name }}'" -o "$OUTPUT_NAME" ./dashboard
          mkdir -p release
          mv "$OUTPUT_NAME" "release/nezha-dashboard-${{ matrix.goos }}-${{ matrix.goarch }}${OUTPUT_NAME##nezha-dashboard}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nezha-dashboard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/nezha-dashboard-${{ matrix.goos }}-${{ matrix.goarch }}*

  create-release:
    needs: build-dashboard
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
