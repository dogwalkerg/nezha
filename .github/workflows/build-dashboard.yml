name: Build NeZha Dashboard

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            output: nezha-dashboard-linux-amd64
          - os: linux
            arch: arm64
            output: nezha-dashboard-linux-arm64
          - os: windows
            arch: amd64
            output: nezha-dashboard-windows-amd64.exe
          - os: darwin
            arch: amd64
            output: nezha-dashboard-darwin-amd64
          - os: darwin
            arch: arm64
            output: nezha-dashboard-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Verify directory structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "cmd directory contents:"
          ls -la cmd/
          echo "cmd/dashboard contents:"
          ls -la cmd/dashboard/

      - name: Build ${{ matrix.output }}
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build -trimpath \
            -ldflags="-s -w" \
            -o "${{ matrix.output }}" ./cmd/dashboard

      - name: Verify built binary
        run: |
          if [ "${{ matrix.os }}" != "windows" ]; then
            file "${{ matrix.output }}"
            # 给 Linux 和 Darwin 二进制文件添加执行权限
            chmod +x "${{ matrix.output }}"
          else
            echo "Windows binary built: ${{ matrix.output }}"
          fi

      - name: Upload ${{ matrix.output }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  create-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for file in *; do
            if [ -f "$file" ] && [[ "$file" != *.sha256 ]]; then
              echo "Creating checksum for $file"
              if command -v sha256sum >/dev/null 2>&1; then
                sha256sum "$file" > "$file.sha256"
              else
                shasum -a 256 "$file" > "$file.sha256"
              fi
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.sha256
            artifacts/nezha-dashboard-linux-amd64
            artifacts/nezha-dashboard-linux-arm64
            artifacts/nezha-dashboard-windows-amd64.exe
            artifacts/nezha-dashboard-darwin-amd64
            artifacts/nezha-dashboard-darwin-arm64
          generate_release_notes: true
