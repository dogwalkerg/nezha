name: ABCuild Nezha Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write   # 允许写 Release，替代 modify-file-content

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERSION: v1.13.1  # 固定版本号

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build frontend
        working-directory: dashboard/resource
        run: |
          pnpm install
          pnpm build

      - name: Build binaries
        working-directory: dashboard
        run: |
          GOOS=linux GOARCH=amd64 go build -o app-linux-amd64-${{ env.VERSION }} .
          GOOS=linux GOARCH=arm64 go build -o app-linux-arm64-${{ env.VERSION }} .

      - name: List built files
        working-directory: dashboard
        run: ls -lh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: |
            ./dashboard/app-linux-amd64-${{ env.VERSION }}
            ./dashboard/app-linux-arm64-${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
