name: name: DYList repo files

on:
  workflow_dispatch:   # 手动触发
  push:
    branches:
      - main

jobs:
  list-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print root directory
        run: ls -lh

      - name: Print all directories recursively
        run: ls -R


